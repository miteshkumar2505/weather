<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-bg: #ffffff;
            --color-text: #1a1a1a;
            --color-border: #e0e0e0;
            --color-accent: #3b82f6;
            --color-card-bg: #f9fafb;
            --color-secondary-text: #666666;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --color-bg: #0f1419;
                --color-text: #e8e8e8;
                --color-border: #2a2a2a;
                --color-card-bg: #1a1f2e;
                --color-secondary-text: #b0b0b0;
                --shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            }
        }

        /* Weather-specific accent colors */
        .weather-clear {
            --color-accent: #f59e0b;
        }

        .weather-cloudy {
            --color-accent: #8b8b8b;
        }

        .weather-rainy {
            --color-accent: #3b82f6;
        }

        .weather-snow {
            --color-accent: #60a5fa;
        }

        .weather-thunderstorm {
            --color-accent: #6366f1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            font-size: 15px;
            line-height: 1.6;
            transition: background-color 0.3s, color 0.3s;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            text-align: center;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .search-box {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            background-color: var(--color-card-bg);
            color: var(--color-text);
            font-size: 15px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--color-accent);
        }

        button {
            padding: 12px 24px;
            background-color: var(--color-accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            opacity: 0.8;
        }

        .suggestions {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: var(--color-card-bg);
            border: 1px solid var(--color-border);
            border-top: none;
            border-radius: 0 0 8px 8px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 10;
        }

        .suggestions.active {
            display: block;
        }

        .suggestion-item {
            padding: 10px 16px;
            cursor: pointer;
            transition: background-color 0.2s;
            border-bottom: 1px solid var(--color-border);
        }

        .suggestion-item:last-child {
            border-bottom: none;
        }

        .suggestion-item:hover {
            background-color: var(--color-border);
        }

        .search-wrapper {
            position: relative;
        }

        .current-weather {
            background-color: var(--color-card-bg);
            border: 1px solid var(--color-border);
            border-radius: 12px;
            padding: 40px 24px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .city-name {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .location-date {
            color: var(--color-secondary-text);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .temperature {
            font-size: 56px;
            font-weight: 300;
            margin-bottom: 8px;
            color: var(--color-accent);
        }

        .weather-description {
            font-size: 18px;
            color: var(--color-secondary-text);
            margin-bottom: 20px;
            text-transform: capitalize;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--color-border);
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            font-size: 12px;
            color: var(--color-secondary-text);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .detail-value {
            font-size: 16px;
            font-weight: 500;
        }

        .forecast {
            margin-bottom: 20px;
        }

        .forecast-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .forecast-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .forecast-card {
            background-color: var(--color-card-bg);
            border: 1px solid var(--color-border);
            border-radius: 10px;
            padding: 16px;
            text-align: center;
            transition: transform 0.2s;
        }

        .forecast-card:hover {
            transform: translateY(-2px);
        }

        .forecast-day {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .forecast-icon {
            font-size: 32px;
            margin: 8px 0;
        }

        .forecast-temp {
            font-size: 14px;
            color: var(--color-accent);
            font-weight: 600;
            margin-bottom: 4px;
        }

        .forecast-condition {
            font-size: 12px;
            color: var(--color-secondary-text);
            text-transform: capitalize;
        }

        .error {
            background-color: #fee2e2;
            color: #991b1b;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }

        @media (prefers-color-scheme: dark) {
            .error {
                background-color: #7f1d1d;
                color: #fecaca;
            }
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--color-secondary-text);
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather</h1>
            <div class="search-wrapper">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="cityInput" 
                        placeholder="Search city..."
                        autocomplete="off"
                    />
                    <button onclick="searchCity()">Search</button>
                </div>
                <div class="suggestions" id="suggestions"></div>
            </div>
        </header>

        <div id="errorMsg"></div>
        <div id="weatherContent"></div>
    </div>

    <script>
        const API_BASE = 'https://geocoding-api.open-meteo.com/v1/search';
        const FORECAST_BASE = 'https://api.open-meteo.com/v1/forecast';

        // Fallback data for Tokyo
        const FALLBACK_DATA = {
            city: 'Tokyo',
            country: 'Japan',
            latitude: 35.6762,
            longitude: 139.6503,
            timezone: 'Asia/Tokyo'
        };

        let selectedCity = null;
        let suggestionsTimeout = null;

        // Weather condition to WMO code mapping
        function getWeatherClass(code) {
            if (code === 0 || code === 1) return 'weather-clear';
            if (code === 2 || code === 3) return 'weather-cloudy';
            if (code >= 45 && code <= 48) return 'weather-cloudy';
            if (code >= 51 && code <= 67 || code >= 80 && code <= 82) return 'weather-rainy';
            if (code >= 71 && code <= 77 || code >= 85 && code <= 86) return 'weather-snow';
            if (code >= 80 && code <= 82 || code === 95 || code === 96 || code === 99) return 'weather-thunderstorm';
            return 'weather-clear';
        }

        function getWeatherIcon(code) {
            if (code === 0) return '☀️';
            if (code === 1 || code === 2) return '🌤️';
            if (code === 3 || code === 45) return '☁️';
            if (code === 48 || code === 3) return '🌫️';
            if (code >= 51 && code <= 67) return '🌦️';
            if (code >= 71 && code <= 77 || code >= 85 && code <= 86) return '❄️';
            if (code >= 80 && code <= 82) return '🌧️';
            if (code === 95 || code === 96 || code === 99) return '⛈️';
            return '🌤️';
        }

        function getWeatherDescription(code) {
            const descriptions = {
                0: 'Clear sky',
                1: 'Mainly clear',
                2: 'Partly cloudy',
                3: 'Overcast',
                45: 'Foggy',
                48: 'Foggy',
                51: 'Light drizzle',
                53: 'Moderate drizzle',
                55: 'Dense drizzle',
                61: 'Slight rain',
                63: 'Moderate rain',
                65: 'Heavy rain',
                71: 'Slight snow',
                73: 'Moderate snow',
                75: 'Heavy snow',
                77: 'Snow grains',
                80: 'Slight rain showers',
                81: 'Moderate rain showers',
                82: 'Violent rain showers',
                85: 'Slight snow showers',
                86: 'Heavy snow showers',
                95: 'Thunderstorm',
                96: 'Thunderstorm with hail',
                99: 'Thunderstorm with hail'
            };
            return descriptions[code] || 'Unknown';
        }

        async function geocodeCity(cityName) {
            try {
                const response = await fetch(`${API_BASE}?name=${encodeURIComponent(cityName)}&count=10&language=en&format=json`);
                const data = await response.json();
                return data.results || [];
            } catch (error) {
                console.error('Geocoding error:', error);
                return [];
            }
        }

        async function getWeather(latitude, longitude, timezone) {
            try {
                const response = await fetch(
                    `${FORECAST_BASE}?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,weather_code,relative_humidity_2m,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=${timezone}`
                );
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Weather API error:', error);
                return null;
            }
        }

        async function loadWeather(city) {
            document.getElementById('weatherContent').innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading weather...</p></div>';
            document.getElementById('errorMsg').innerHTML = '';

            const weatherData = await getWeather(city.latitude, city.longitude, city.timezone);

            if (!weatherData) {
                showError('Could not fetch weather. Showing fallback data.');
                await loadWeatherWithFallback(city);
                return;
            }

            selectedCity = city;
            displayWeather(city, weatherData);
        }

        async function loadWeatherWithFallback(city) {
            const weatherData = await getWeather(city.latitude, city.longitude, city.timezone);
            
            if (weatherData) {
                displayWeather(city, weatherData);
            } else {
                displayFallbackWeather(city);
            }
        }

        function displayWeather(city, weatherData) {
            const current = weatherData.current;
            const daily = weatherData.daily;
            const now = new Date();

            const weatherClass = getWeatherClass(current.weather_code);
            const containerEl = document.getElementById('weatherContent');
            containerEl.className = weatherClass;

            let html = `
                <div class="current-weather">
                    <div class="city-name">${city.name}</div>
                    <div class="location-date">${city.country || ''} • ${now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}</div>
                    <div class="temperature">${Math.round(current.temperature_2m)}°</div>
                    <div class="weather-description">${getWeatherDescription(current.weather_code)}</div>
                    <div class="weather-details">
                        <div class="detail-item">
                            <div class="detail-label">Humidity</div>
                            <div class="detail-value">${current.relative_humidity_2m}%</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">Wind</div>
                            <div class="detail-value">${Math.round(current.wind_speed_10m)} km/h</div>
                        </div>
                    </div>
                </div>
            `;

            html += '<div class="forecast"><div class="forecast-title">5-Day Forecast</div><div class="forecast-grid">';

            for (let i = 0; i < 5; i++) {
                const date = new Date(daily.time[i]);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'short' });
                const code = daily.weather_code[i];
                const maxTemp = Math.round(daily.temperature_2m_max[i]);
                const minTemp = Math.round(daily.temperature_2m_min[i]);

                html += `
                    <div class="forecast-card">
                        <div class="forecast-day">${dayName}</div>
                        <div class="forecast-icon">${getWeatherIcon(code)}</div>
                        <div class="forecast-temp">${maxTemp}° / ${minTemp}°</div>
                        <div class="forecast-condition">${getWeatherDescription(code)}</div>
                    </div>
                `;
            }

            html += '</div></div>';
            containerEl.innerHTML = html;
        }

        function displayFallbackWeather(city) {
            const containerEl = document.getElementById('weatherContent');
            containerEl.className = 'weather-clear';

            const fallbackCurrent = {
                temperature_2m: 18,
                weather_code: 1,
                relative_humidity_2m: 65,
                wind_speed_10m: 8
            };

            const fallbackDaily = {
                time: Array.from({length: 5}, (_, i) => {
                    const d = new Date();
                    d.setDate(d.getDate() + i);
                    return d.toISOString().split('T')[0];
                }),
                weather_code: [1, 2, 3, 1, 0],
                temperature_2m_max: [22, 20, 18, 21, 24],
                temperature_2m_min: [16, 14, 12, 15, 18]
            };

            displayWeather(city, {
                current: fallbackCurrent,
                daily: fallbackDaily
            });
        }

        async function searchCity() {
            const input = document.getElementById('cityInput').value.trim();
            if (!input) return;

            const results = await geocodeCity(input);
            if (results.length === 0) {
                showError('City not found');
                return;
            }

            const city = results[0];
            const cityData = {
                name: city.name,
                country: city.country || '',
                latitude: city.latitude,
                longitude: city.longitude,
                timezone: city.timezone
            };

            document.getElementById('cityInput').value = '';
            document.getElementById('suggestions').classList.remove('active');
            await loadWeather(cityData);
        }

        function showError(msg) {
            document.getElementById('errorMsg').innerHTML = `<div class="error">${msg}</div>`;
        }

        async function showSuggestions() {
            const input = document.getElementById('cityInput').value.trim();
            const suggestionsEl = document.getElementById('suggestions');

            if (!input || input.length < 2) {
                suggestionsEl.classList.remove('active');
                return;
            }

            clearTimeout(suggestionsTimeout);
            suggestionsTimeout = setTimeout(async () => {
                const results = await geocodeCity(input);
                
                if (results.length === 0) {
                    suggestionsEl.classList.remove('active');
                    return;
                }

                suggestionsEl.innerHTML = results.slice(0, 5).map(r => `
                    <div class="suggestion-item" onclick="selectSuggestion('${r.name}', '${r.country || ''}', ${r.latitude}, ${r.longitude}, '${r.timezone}')">
                        ${r.name}, ${r.country || 'Unknown'}
                    </div>
                `).join('');

                suggestionsEl.classList.add('active');
            }, 300);
        }

        async function selectSuggestion(name, country, lat, lon, tz) {
            document.getElementById('cityInput').value = name;
            document.getElementById('suggestions').classList.remove('active');

            await loadWeather({
                name: name,
                country: country,
                latitude: lat,
                longitude: lon,
                timezone: tz
            });
        }

        // Event listeners
        document.getElementById('cityInput').addEventListener('input', showSuggestions);
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') searchCity();
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-wrapper')) {
                document.getElementById('suggestions').classList.remove('active');
            }
        });

        // Load Tokyo on page load
        window.addEventListener('load', () => {
            loadWeather(FALLBACK_DATA);
        });
    </script>
</body>
</html>
